<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BabyHaven · Cart</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<!-- Google Font: Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(145deg, #fff9fb 0%, #ffeef4 100%);
    color: #4a2c3a;
  }
  .navbar-custom {
    background: rgba(255, 240, 248, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 25px -8px rgba(210, 80, 140, 0.2);
    border-bottom: 1px solid rgba(255, 200, 220, 0.5);
    padding: 14px 0;
  }
  .navbar-brand {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(130deg, #c2185b, #e64980);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent !important;
    letter-spacing: 1px;
  }
  .navbar-nav .nav-link {
    color: #553b48;
    font-weight: 500;
    margin: 0 8px;
    padding: 8px 16px !important;
    border-radius: 40px;
  }
  .navbar-nav .nav-link:hover {
    background: rgba(255, 130, 180, 0.15);
    color: #b82b6b;
  }
  .navbar-nav .nav-link.active {
    background: linear-gradient(145deg, #ffdae9, #ffc4db);
    color: #b1306b !important;
    font-weight: 600;
    box-shadow: 0 6px 14px rgba(255, 105, 160, 0.3);
  }
  .nav-icon-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 12px;
  }
  .icon-circle {
    background: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 14px #fccfdf;
    color: #d96f94;
    font-size: 1.3rem;
    transition: 0.2s;
    position: relative;
  }
  .badge-bubble {
    position: absolute;
    top: -6px;
    right: -6px;
    background: #ff4d94;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 50px;
    border: 2px solid white;
    min-width: 20px;
    text-align: center;
  }
  .section-greeting {
    text-align: center;
    margin: 50px 0 20px;
  }
  .section-greeting h2 {
    font-size: 2.5rem;
    font-weight: 600;
    background: linear-gradient(145deg, #d4508f, #f07bac);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .cart-layout {
    max-width: 1200px;
    margin: 40px auto 80px;
    padding: 0 15px;
  }
  .cart-item {
    background: white;
    border-radius: 24px;
    box-shadow: 0 18px 35px -8px rgba(210, 80, 140, 0.2);
    display: flex;
    gap: 20px;
    padding: 20px;
    align-items: center;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 210, 230, 0.7);
    transition: all 0.3s ease;
  }
  .cart-item:hover {
    box-shadow: 0 28px 50px -12px #d45d93;
    transform: translateY(-2px);
  }
  .cart-img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 20px;
    background: #fff1f7;
    padding: 10px;
  }
  .cart-info {
    flex-grow: 1;
  }
  .cart-name {
    font-weight: 600;
    font-size: 1.3rem;
    color: #7d4d65;
    margin-bottom: 5px;
  }
  .cart-price {
    font-weight: 700;
    font-size: 1.5rem;
    background: linear-gradient(135deg, #ff2891, #c9216b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 15px;
  }
  
  /* Quantity Controls */
  .quantity-controls {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #fff5fa;
    padding: 8px 15px;
    border-radius: 40px;
    width: fit-content;
    border: 1px solid #ffb8d2;
  }
  .quantity-btn {
    background: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #d96f94;
    box-shadow: 0 2px 8px rgba(255, 77, 148, 0.2);
    transition: all 0.2s;
    cursor: pointer;
  }
  .quantity-btn:hover {
    background: #ff4d94;
    color: white;
    transform: scale(1.1);
  }
  .quantity-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: #ffe2ed;
    color: #d96f94;
  }
  .quantity-btn:disabled:hover {
    background: #ffe2ed;
    color: #d96f94;
    transform: none;
  }
  .quantity-value {
    font-weight: 600;
    font-size: 1.2rem;
    min-width: 30px;
    text-align: center;
    color: #c2185b;
  }
  
  /* Remove Button */
  .btn-remove {
    background: #ffe2ed;
    border: 1px solid #ffb8d2;
    color: #ff4d94;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 20px;
  }
  .btn-remove:hover {
    background: #ff4d94;
    color: white;
    border-color: #ff4d94;
    transform: scale(1.05);
  }
  
  .cart-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .cart-summary {
    background: white;
    border-radius: 24px;
    padding: 25px;
    margin: 30px 0;
    box-shadow: 0 18px 35px -8px rgba(210, 80, 140, 0.2);
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #ffe2ed;
    font-size: 1.1rem;
  }
  .summary-row.total {
    border-bottom: none;
    font-size: 1.8rem;
    font-weight: 700;
    color: #c2185b;
    padding-top: 20px;
  }
  .btn-checkout {
    background: linear-gradient(135deg, #ff9fcb, #ff80b3);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 1.3rem;
    padding: 18px 40px;
    border-radius: 50px;
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    display: block;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 20px rgba(255, 77, 148, 0.3);
  }
  .btn-checkout:hover {
    background: linear-gradient(135deg, #ff80b3, #ff4d94);
    transform: scale(1.02);
    box-shadow: 0 15px 30px rgba(255, 77, 148, 0.4);
  }
  .empty-cart {
    text-align: center;
    color: #b1306b;
    font-weight: 600;
    font-size: 1.3rem;
    margin-top: 50px;
    padding: 40px;
    background: white;
    border-radius: 30px;
    box-shadow: 0 18px 35px -8px rgba(210, 80, 140, 0.2);
  }
  
  /* Modal Styles */
  .modal-content {
    border-radius: 30px;
    border: none;
    box-shadow: 0 20px 40px rgba(210, 80, 140, 0.3);
  }
  .modal-header {
    background: linear-gradient(135deg, #ffe6f0, #ffd9e8);
    border-radius: 30px 30px 0 0;
    border-bottom: 1px solid #ffb8d2;
    padding: 20px 25px;
  }
  .modal-title {
    color: #c2185b;
    font-weight: 600;
    font-size: 1.5rem;
  }
  .modal-body {
    padding: 25px;
  }
  .simple-form .form-label {
    color: #7d4d65;
    font-weight: 500;
    margin-bottom: 5px;
  }
  .simple-form .form-control,
  .simple-form .form-select {
    border-radius: 15px;
    border: 1px solid #ffb8d2;
    padding: 12px 15px;
    margin-bottom: 15px;
    font-family: 'Poppins', sans-serif;
  }
  .simple-form .form-control:focus,
  .simple-form .form-select:focus {
    border-color: #ff4d94;
    box-shadow: 0 0 0 0.2rem rgba(255, 77, 148, 0.15);
  }
  .order-total-mini {
    background: #ffe6f0;
    border-radius: 15px;
    padding: 15px;
    margin: 15px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }
  .order-total-mini span:last-child {
    color: #c2185b;
    font-size: 1.3rem;
  }
  .btn-modal-close {
    background: #ffe2ed;
    border: none;
    color: #d96f94;
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: 500;
  }
  .btn-modal-submit {
    background: linear-gradient(135deg, #ff9fcb, #ff80b3);
    border: none;
    color: white;
    padding: 10px 25px;
    border-radius: 25px;
    font-weight: 600;
  }
  .btn-modal-submit:hover {
    background: linear-gradient(135deg, #ff80b3, #ff4d94);
  }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="bi bi-cup-heart-fill me-2"></i>BabyHaven</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
      
        <li class="nav-item nav-icon-group">
          <a href="cart.html" class="icon-circle position-relative text-decoration-none">
            <i class="bi bi-handbag-fill"></i>
            <span id="cartCount" class="badge-bubble">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Page Greeting -->
<div class="section-greeting">
  <h2>your cart</h2>
  <p>🛒 update quantities or remove items</p>
</div>

<!-- Cart Layout -->
<div class="cart-layout" id="cartContainer"></div>

<!-- Cart Summary and Checkout Button -->
<div class="cart-layout" id="summaryContainer" style="display: none;">
  <div class="cart-summary">
    <div class="summary-row">
      <span>Subtotal:</span>
      <span id="subtotal">$0.00</span>
    </div>
    <div class="summary-row">
      <span>Shipping:</span>
      <span id="shipping">$10.00</span>
    </div>
    <div class="summary-row">
      <span>Tax (10%):</span>
      <span id="tax">$0.00</span>
    </div>
    <div class="summary-row total">
      <span>Grand Total:</span>
      <span id="grandTotal">$0.00</span>
    </div>
  </div>
  
  <button class="btn-checkout" onclick="openCheckoutModal()">
    <i class="bi bi-bag-heart-fill"></i> Proceed to Checkout
  </button>
</div>

<!-- Simple Checkout Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-cup-heart-fill me-2"></i>Complete Your Order
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <div class="modal-body">
        <form id="simpleCheckoutForm" class="simple-form" onsubmit="event.preventDefault(); placeOrder();">
          <div>
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
          </div>
          
          <div>
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
          </div>
          
          <div>
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="(123) 456-7890" required>
          </div>
          
          <div>
            <label class="form-label">Shipping Address</label>
            <input type="text" class="form-control" id="address" placeholder="Street address, city, zip" required>
          </div>
          
          <div>
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="paymentMethod" required>
              <option value="" disabled selected>Select payment</option>
              <option value="credit">💳 Credit Card</option>
              <option value="debit">💳 Debit Card</option>
              <option value="paypal">📱 PayPal</option>
            </select>
          </div>
          
          <div class="order-total-mini">
            <span>Total Amount:</span>
            <span id="modalTotal">$0.00</span>
          </div>
        </form>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn-modal-close" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn-modal-submit" onclick="placeOrder()">
          <i class="bi bi-check-lg"></i> Place Order
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Load cart data
  let cartCount = parseInt(localStorage.getItem('babyCartCount')) || 0;
  let cartItems = JSON.parse(localStorage.getItem('babyCartItems') || '[]');

  // Ensure all items have quantity property
  cartItems = cartItems.map(item => ({
    ...item,
    quantity: item.quantity || 1
  }));

  // Update cart badge
  function updateBadges() {
    document.getElementById('cartCount').innerText = cartCount;
  }

  // Calculate totals
  function calculateTotals() {
    let subtotal = 0;
    cartItems.forEach(item => {
      const price = parseFloat(item.price.replace('$', '')) || 0;
      subtotal += price * (item.quantity || 1);
    });
    
    const shipping = subtotal > 0 ? 10 : 0;
    const tax = subtotal * 0.1;
    const grandTotal = subtotal + shipping + tax;
    
    return {
      subtotal: subtotal.toFixed(2),
      shipping: shipping.toFixed(2),
      tax: tax.toFixed(2),
      grandTotal: grandTotal.toFixed(2)
    };
  }

  // Update all displays
  function updateAllDisplays() {
    const totals = calculateTotals();
    
    // Update summary
    document.getElementById('subtotal').textContent = `$${totals.subtotal}`;
    document.getElementById('shipping').textContent = `$${totals.shipping}`;
    document.getElementById('tax').textContent = `$${totals.tax}`;
    document.getElementById('grandTotal').textContent = `$${totals.grandTotal}`;
    
    // Update cart count
    cartCount = cartItems.reduce((total, item) => total + (item.quantity || 1), 0);
    localStorage.setItem('babyCartCount', cartCount);
    updateBadges();
    
    return totals;
  }

  // Update quantity
  function updateQuantity(index, change) {
    if (cartItems[index]) {
      const newQuantity = (cartItems[index].quantity || 1) + change;
      
      if (newQuantity >= 1) {
        cartItems[index].quantity = newQuantity;
        
        // Update the quantity display
        const qtyElement = document.getElementById(`qty-${index}`);
        if (qtyElement) {
          qtyElement.textContent = newQuantity;
        }
        
        // Save to localStorage
        localStorage.setItem('babyCartItems', JSON.stringify(cartItems));
        
        // Update all displays
        updateAllDisplays();
      }
    }
  }

  // Remove item from cart
  function removeFromCart(index) {
    const removed = cartItems[index];
    
    if (confirm(`Remove ${removed.name} from cart?`)) {
      cartItems.splice(index, 1);
      
      // Save to localStorage
      localStorage.setItem('babyCartItems', JSON.stringify(cartItems));
      
      // Re-render the cart
      renderCart();
      
      // Update all displays
      updateAllDisplays();
    }
  }

  // Render cart items
  function renderCart() {
    const container = document.getElementById('cartContainer');
    const summaryContainer = document.getElementById('summaryContainer');
    
    container.innerHTML = '';

    if (cartItems.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <i class="bi bi-bag-x" style="font-size: 3rem;"></i>
          <p class="mt-3">Your cart is empty 🛒</p>
          <a href="shop.html" class="btn btn-primary mt-3" style="background: #ff4d94; border: none; border-radius: 30px; padding: 12px 30px;">Continue Shopping</a>
        </div>
      `;
      summaryContainer.style.display = 'none';
      return;
    }

    summaryContainer.style.display = 'block';

    cartItems.forEach((item, index) => {
      const price = parseFloat(item.price.replace('$', '')) || 0;
      const itemTotal = (price * (item.quantity || 1)).toFixed(2);
      
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}" class="cart-img" />
        <div class="cart-info">
          <div class="cart-name">${item.name}</div>
          <div class="cart-price">$${itemTotal}</div>
          
          <div class="quantity-controls">
            <button class="quantity-btn" onclick="updateQuantity(${index}, -1)" ${item.quantity <= 1 ? 'disabled' : ''}>
              <i class="bi bi-dash"></i>
            </button>
            <span class="quantity-value" id="qty-${index}">${item.quantity || 1}</span>
            <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">
              <i class="bi bi-plus"></i>
            </button>
          </div>
        </div>
        
        <div class="cart-actions">
          <button class="btn-remove" onclick="removeFromCart(${index})">
            <i class="bi bi-trash"></i> Remove
          </button>
        </div>
      `;
      container.appendChild(div);
    });
    
    updateAllDisplays();
  }

  // Open checkout modal
  function openCheckoutModal() {
    const totals = calculateTotals();
    document.getElementById('modalTotal').textContent = `$${totals.grandTotal}`;
    
    const modal = new bootstrap.Modal(document.getElementById('checkoutModal'));
    modal.show();
  }

  // Place order
  function placeOrder() {
    const form = document.getElementById('simpleCheckoutForm');
    
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const name = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const totals = calculateTotals();

    // Show order summary
    let orderSummary = "📦 ORDER SUMMARY\n\n";
    cartItems.forEach(item => {
      orderSummary += `${item.name} x${item.quantity} - $${(parseFloat(item.price.replace('$', '')) * item.quantity).toFixed(2)}\n`;
    });
    orderSummary += `\nTotal: $${totals.grandTotal}`;

    alert(`✅ Order Placed Successfully!\n\nThank you ${name}!\n\n${orderSummary}\n\nConfirmation sent to: ${email}`);

    // Clear cart
    cartItems = [];
    localStorage.setItem('babyCartItems', JSON.stringify(cartItems));
    localStorage.setItem('babyCartCount', 0);

    // Close modal
    const modal = bootstrap.Modal.getInstance(document.getElementById('checkoutModal'));
    modal.hide();

    // Reset form
    form.reset();

    // Update UI
    renderCart();
    updateAllDisplays();
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    renderCart();
    updateAllDisplays();
  });
</script>
</body>
</html>
