<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #fffafc;
      font-family: 'Poppins', sans-serif;
      padding: 30px 0;
    }

    .product-card {
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(214, 51, 132, 0.15);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: white;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(214, 51, 132, 0.3);
    }

    .product-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .product-body {
      padding: 15px 20px;
    }

    .product-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: #d63384;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-desc {
      font-size: 0.9rem;
      color: #777;
      height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    .product-price {
      font-weight: 700;
      color: #ff4da6;
      font-size: 1.1rem;
    }

    /* Small icon container */
    .product-icons {
      margin-top: 8px;
    }

    .product-icons i {
      color: #ffb6c1;
      margin-right: 5px;
      font-size: 1rem;
    }
    <style>
  body {
    background: linear-gradient(135deg, #fff0f6, #ffe6f0);
    font-family: 'Poppins', sans-serif;
    padding: 40px 0;
  }

  .product-card {
    border-radius: 25px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
    overflow: hidden;
    transition: all 0.35s ease;
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3);
  }

  .product-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    transition: 0.4s;
  }

  .product-card:hover .product-img {
    transform: scale(1.05);
  }

  .product-body {
    padding: 20px;
    text-align: center;
  }

  .product-title {
    font-weight: 600;
    font-size: 1.1rem;
    color: #d63384;
    margin-bottom: 8px;
  }

  .product-price {
    font-weight: 700;
    font-size: 1.2rem;
    background: linear-gradient(to right, #ff4da6, #ff80bf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .product-icons i {
    color: #ffc0cb;
    margin: 0 2px;
  }

  .add-btn {
    margin-top: 10px;
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 0.85rem;
    background: linear-gradient(to right, #ff4da6, #ff80bf);
    border: none;
    color: white;
    transition: 0.3s;
  }

  .add-btn:hover {
    background: linear-gradient(to right, #ff80bf, #ff4da6);
    transform: scale(1.05);
  }
</style>
  </style>
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

<div class="container">
  <div class="row g-4">

    <div class="col-6 col-md-3">
      <div class="product-card">
        <img src="babyromper.jpg" alt="Mango Mochi" class="product-img" />
        <div class="product-body">
          <div class="product-title" title="Mango Mochi">baby romper</div>
          
          <div class="product-price">$150.00</div>
          <div class="product-icons">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-half"></i><i class="bi bi-star"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="product-card">
        <img src="softblanket.jpg" alt="Matcha Roll" class="product-img" />
        <div class="product-body">
          <div class="product-title" title="Matcha Roll">soft blanket</div>
 
          <div class="product-price">$25.00</div>
          <div class="product-icons">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="product-card">
        <img src="babyshoes.jpg" alt="Strawberry Cake Roll" class="product-img" />
        <div class="product-body">
          <div class="product-title" title="Strawberry Cake Roll">baby shoes</div>
          
          <div class="product-price">$24.00</div>
          <div class="product-icons">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star"></i><i class="bi bi-star"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="product-card">
        <img src="baby towel.jpg" alt="Panna" class="product-img" />
        <div class="product-body">
          <div class="product-title" title="Panna">baby towel</div>
       
          <div class="product-price">$18.00</div>
          <div class="product-icons">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-half"></i><i class="bi bi-star"></i><i class="bi bi-star"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Add more product cards similarly -->

  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
